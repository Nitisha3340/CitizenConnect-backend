# --- MySQL (default) ---
# Start MySQL, then run without profile "local". Override via env in deployment:
#   DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD, JPA_DDL_AUTO
# Local checklist: jdbc:mysql://localhost:3306/<DB_NAME> ... user/password must match a MySQL account.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/citizen_connect?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update = create/alter tables from entities (dev-friendly). Use validate/none in production if you prefer migrations.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Uncomment for deeper debugging (401 / SQL):
# logging.level.org.springframework.security=DEBUG
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

server.address=0.0.0.0

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP validity for signup and login (minutes)
app.otp.expiry-minutes=10

# Minimum seconds between OTP sends for the same email+purpose (429 if too soon). Use 0 to disable.
app.otp.resend-cooldown-seconds=60

# If true, OTP is printed to server logs (use only for local/dev; never enable in production).
app.mail.log-otp-to-console=false

# In MySQL after signup/login: SELECT * FROM users; SELECT * FROM complaints; (there is no "issues" table)
# Local in-memory DB (no MySQL): run with spring.profiles.active=local (see application-local.properties)

# Swagger UI: http://<host>:<port>/swagger-ui/index.html  |  OpenAPI JSON: /v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true
# Remember JWT in Swagger UI after Authorize (refresh-safe)
springdoc.swagger-ui.persistAuthorization=true
