# --- MySQL (deploy / non-local) ---
# Do NOT use localhost in production (Railway, etc.). Set env vars on the host:
#   DATABASE_URL = jdbc:mysql://host:port/db?...  OR  mysql://user:pass@host:port/db (auto-converted)
#   DATABASE_USERNAME / DATABASE_PASSWORD if not embedded in URL (also MYSQLUSER / MYSQLPASSWORD)
#   Or discrete: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Profile "local" uses H2 from application-local.properties (no DATABASE_URL needed).
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Fallback MySQL connection (only used if DATABASE_URL is not set)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/citizen_connect?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DATABASE_PASSWORD:${MYSQLPASSWORD:1234}}

# update = create/alter tables from entities (dev-friendly). Use validate/none in production if you prefer migrations.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
# Railway: keep false unless debugging (set SHOW_SQL=true)
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
# Dialect is inferred from JDBC URL (MySQL vs H2); avoid forcing MySQL dialect when profile=local uses H2
spring.jpa.open-in-view=false

# Uncomment for deeper debugging (401 / SQL):
# logging.level.org.springframework.security=DEBUG
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

server.address=0.0.0.0
# Railway (and other PaaS) assign a dynamic port — must bind to PORT or the service shows as crashed
server.port=${PORT:8080}
# Behind Railway TLS terminator — correct scheme/host for redirects and forwarded requests
server.forward-headers-strategy=framework

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER:${SMTP_USERNAME:${MAIL_USERNAME:}}}
spring.mail.password=${SMTP_PASSWORD:${SMTP_PASS:${MAIL_PASSWORD:}}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Use a Gmail App Password here. Do NOT store real credentials in source control.
# Production env variables supported: SMTP_USER / SMTP_PASSWORD or MAIL_USERNAME / MAIL_PASSWORD.
# OTP validity for signup and login (minutes)
app.otp.expiry-minutes=10

# Minimum seconds between OTP sends for the same email+purpose (429 if too soon). Use 0 to disable.
app.otp.resend-cooldown-seconds=60

# If true, OTP is printed to server logs (use only for local/dev; never enable in production).
app.mail.log-otp-to-console=false

# In MySQL after signup/login: SELECT * FROM users; SELECT * FROM complaints; (there is no "issues" table)
# Local in-memory DB (no MySQL): run with spring.profiles.active=local (see application-local.properties)

# Swagger UI: http://<host>:<port>/swagger-ui/index.html  |  OpenAPI JSON: /v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true
# Remember JWT in Swagger UI after Authorize (refresh-safe)
springdoc.swagger-ui.persistAuthorization=true
