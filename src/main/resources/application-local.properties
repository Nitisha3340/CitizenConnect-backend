# Gmail credentials: copy application-mail-local.properties.example → application-mail-local.properties (gitignored)
# Also supports optional project-root mail-local.properties (overrides classpath if present)
spring.config.import=optional:classpath:application-mail-local.properties,optional:file:./mail-local.properties

spring.datasource.url=jdbc:h2:mem:citizen_connect;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
# Override root application.properties (SHOW_SQL defaults false for Railway)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable auto-generated security password since using JWT
spring.security.user.password=none

# Easier Swagger/manual testing: allow immediate OTP resend
app.otp.resend-cooldown-seconds=0

# See OTP in the backend terminal even when email works (and when SMTP fails)
app.mail.log-otp-to-console=true

# Set MAIL_DEBUG=true when diagnosing SMTP (very verbose console output)
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
